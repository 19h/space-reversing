syntax = "proto3";

package sc.external.services.friends.v1;

import "google/api/annotations.proto";

import "sc/external/services/friends/v1/types.proto";
import "sc/external/common/shard/v1/types.proto";
import "sc/external/common/api/v1/pagination.proto";
import "sc/external/common/api/v1/query.proto";

message GetFriendListRequest {
    sc.external.common.api.v1.Query query = 1;
    sc.external.common.api.v1.PaginationArguments pagination = 2;
}

message GetFriendListResponse {
    repeated Friend friends = 1;
    sc.external.common.api.v1.PaginationInfo page_info = 2;
}

message SearchAccountRequest {
    // name or sub name to search
    string name = 1;
    sc.external.common.api.v1.PaginationArguments pagination = 2;
}

message SearchAccountResponse {
    repeated FriendInfo accounts = 1;
    sc.external.common.api.v1.PaginationInfo page_info = 2;
}

message RemoveFriendRequest {
    uint32 account_id = 1;
}

message RemoveFriendResponse {
}

message GetShardInfoRequest {
    uint32 account_id = 1;
}

message GetShardInfoResponse {
    sc.external.common.shard.v1.ShardInfo shard_info = 1;
}

message SendFriendRequestRequest {
    oneof identifier {
        uint32 account_id = 1;
        uint64 player_id = 2;
    }
}

message SendFriendRequestResponse {
    string request_id = 1;
}

message CancelFriendRequestRequest {
    string request_id = 1;
}

message CancelFriendRequestResponse {
}

message GetPendingFriendRequestRequest {
    sc.external.common.api.v1.Query query = 1;
    sc.external.common.api.v1.PaginationArguments pagination = 2;
}

message GetPendingFriendRequestResponse {
    repeated FriendRequest pending_friend_requests = 1;
    sc.external.common.api.v1.PaginationInfo page_info = 2;
}

message AcceptFriendRequestRequest {
    string request_id = 1;
}

message AcceptFriendRequestResponse {
}

message DeclineFriendRequestRequest {
    string request_id = 1;
}

message DeclineFriendRequestResponse {
}

message GetBlockedAccountRequest {
    sc.external.common.api.v1.Query query = 1;
    sc.external.common.api.v1.PaginationArguments pagination = 2;
}

message GetBlockedAccountResponse {
    repeated FriendInfo blocked_accounts = 1;
    sc.external.common.api.v1.PaginationInfo page_info = 2;
}

message BlockAccountRequest {
    oneof identifier {
        uint32 account_id = 1;
        uint64 player_id = 2;
    }
}

message BlockAccountResponse {
}

message UnblockAccountRequest {
    uint32 account_id = 1;
}

message UnblockAccountResponse {
}

service FriendService {
    /*
        GetFriendList
        Query the friend list of the player requesting, based on the metadata.
    */
    rpc GetFriendList(GetFriendListRequest) returns (GetFriendListResponse) {
        option (google.api.http) = {
            get: "/v1/friend/external/GetFriendList"
        };
    }

    /*
        SearchAccount
        Search an account by nickname, return the list of corresponding account
    */
    rpc SearchAccount(SearchAccountRequest) returns (SearchAccountResponse) {
        option (google.api.http) = {
            get: "/v1/friend/external/SearchAccount"
        };
    }

    /*
        RemoveFriend
        Remove a friend from the friend list
    */
    rpc RemoveFriend(RemoveFriendRequest) returns (RemoveFriendResponse) {
        option (google.api.http) = {
            post: "/v1/friend/external/RemoveFriend",
            body: "*"
        };
    }

    /*
        GetShardInfo
        Query the shard information of where a friend is
    */
    rpc GetShardInfo(GetShardInfoRequest) returns (GetShardInfoResponse) {
        option (google.api.http) = {
            get: "/v1/friend/external/GetShardInfo"
        };
    }

    /*
        SendFriendRequest
        Send a friend request to either an account or a player
    */
    rpc SendFriendRequest(SendFriendRequestRequest) returns (SendFriendRequestResponse) {
        option (google.api.http) = {
            post: "/v1/friend/external/SendFriendRequest",
            body: "*"
        };
    }

    /*
        CancelFriendRequest
    */
    rpc CancelFriendRequest(CancelFriendRequestRequest) returns (CancelFriendRequestResponse) {
        option (google.api.http) = {
            post: "/v1/friend/external/CancelFriendRequest",
            body: "*"
        };
    }

    /*
        GetPendingFriendRequest
        Query the list of pending friend request
    */
    rpc GetPendingFriendRequest(GetPendingFriendRequestRequest) returns (GetPendingFriendRequestResponse) {
        option (google.api.http) = {
            get: "/v1/friend/external/GetPendingFriendRequest"
        };
    }

    /*
        AcceptFriendRequest
        Accept a friend request based on the  request id
    */
    rpc AcceptFriendRequest(AcceptFriendRequestRequest) returns (AcceptFriendRequestResponse) {
        option (google.api.http) = {
            post: "/v1/friend/external/AcceptFriendRequest",
            body: "*"
        };
    }

    /*
        DeclineFriendRequest
        Decline a friend request based on the id of the request
    */
    rpc DeclineFriendRequest(DeclineFriendRequestRequest) returns (DeclineFriendRequestResponse) {
        option (google.api.http) = {
            post: "/v1/friend/external/DeclineFriendRequest",
            body: "*"
        };
    }

    /*
        GetBlockedAccount
        Query the list af account previously blocked by the player
    */
    rpc GetBlockedAccount(GetBlockedAccountRequest) returns (GetBlockedAccountResponse) {
        option (google.api.http) = {
            get: "/v1/friend/external/GetBlockedAccount"
        };
    }

    /*
        BlockAccount
        Block another player's account from you
    */
    rpc BlockAccount(BlockAccountRequest) returns (BlockAccountResponse) {
        option (google.api.http) = {
            post: "/v1/friend/external/BlockAccount",
            body: "*"
        };
    }

    /*
        UnblockAccount
    */
    rpc UnblockAccount(UnblockAccountRequest) returns (UnblockAccountResponse) {
        option (google.api.http) = {
            post : "/v1/friend/external/UnblockAccount",
            body: "*"
        };
    }
}
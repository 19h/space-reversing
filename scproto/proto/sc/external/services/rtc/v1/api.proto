syntax = "proto3";

package sc.external.services.rtc.v1;

import "sc/external/services/rtc/v1/types.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

import "sc/external/common/api/v1/pagination.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
      title: "Social Service - RTC"
      version: "1.0",
      description: "Service responsible for real time communication management"
    }
};


message GetChannelsRequest {
    repeated string group_ids = 1;
    sc.external.common.api.v1.PaginationArguments pagination = 2;
}

message GetChannelsResponse {
    repeated Channel channels = 1;
    // has_next_previous_page is always false for this endpoint
    // because it is not possible to query messages to go back in current implementation
    sc.external.common.api.v1.PaginationInfo page_info = 2;
}

message CallRequest {
    string group_id = 1;
}

message CallResponse {
    Call call = 1;
}

message AcceptCallRequest {
    string group_id = 1;
}

message AcceptCallResponse {
    Channel channel = 1;
}

message DeclineCallRequest {
    string group_id = 1;
}

message DeclineCallResponse {
}

message HangupCallRequest {
    string group_id = 1;
}

message HangupCallResponse {

}

message GetPendingCallsRequest {
    sc.external.common.api.v1.PaginationArguments pagination = 2;
    reserved 1;
    reserved "group_id";
}

message GetPendingCallsResponse {
    repeated Call calls = 1;
    // has_next_previous_page is always false for this endpoint
    // because it is not possible to query messages to go back in current implementation
    sc.external.common.api.v1.PaginationInfo page_info = 2;
}


service RTCService {
    /*
        Get channels connection info for rtc channels. Requires the caller to be a member of the groups.
        If failure to get/create some channels, the response will contain the channels that were successfull only
    */
    rpc GetChannels (GetChannelsRequest) returns (GetChannelsResponse) {
        option (google.api.http) = {
            get: "/v1/rtc/external/GetChannelInfo"
        };
    }

    /*
        Call all members of a group. Once a call is accepted, the clients will obtain the channel connection info and connect to the channel.
    */
    rpc Call(CallRequest) returns (CallResponse) {
        option (google.api.http) = {
            post: "/v1/rtc/external/Call"
            body: "*"
        };
    }

    /*
        Accepts a call.
    */
    rpc AcceptCall(AcceptCallRequest) returns (AcceptCallResponse) {
        option (google.api.http) = {
            post: "/v1/rtc/external/AcceptCall"
            body: "*"
        };
    }
    
    /*
        Declines a call.
    */
    rpc DeclineCall(DeclineCallRequest) returns (DeclineCallResponse) {
        option (google.api.http) = {
            post: "/v1/rtc/external/DeclineCall"
            body: "*"
        };
    }

    /*
        Exit call.
    */
    rpc HangupCall(HangupCallRequest) returns (HangupCallResponse) {
        option (google.api.http) = {
            post: "/v1/rtc/external/HangupCall"
            body: "*"
        };
    }

    /*
        GetPendingCalls

        Get pending calls for the player.
    */
    rpc GetPendingCalls(GetPendingCallsRequest) returns (GetPendingCallsResponse) {
        option (google.api.http) = {
            get: "/v1/rtc/external/GetPendingCalls"
        };
    }

}
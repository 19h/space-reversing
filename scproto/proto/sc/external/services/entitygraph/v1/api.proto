syntax = "proto3";

package sc.external.services.entitygraph.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

import "sc/external/services/entitygraph/v1/rpc_messages.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
      title: "EntityGraph External service"
      version: "1.0",
      description: "Service responsible for querying the entity EntityGraph from game clients."
    }
};

message ContainerQueryRequest {
    sc.external.services.entitygraph.v1.ContainerQueryRequestBody body = 1;
}

message ContainerQueryResponse {
    sc.external.services.entitygraph.v1.ContainerQueryResponseBody body = 1;
}

message MoveRequest {
    sc.external.services.entitygraph.v1.MoveRequestBody body = 1;
}

message MoveResponse {
    sc.external.services.entitygraph.v1.MoveResponseBody body = 1;
}

message GetInventoriesRequest {
    sc.external.services.entitygraph.v1.GetInventoriesRequestBody body = 1;
}

message GetInventoriesResponse {
    sc.external.services.entitygraph.v1.GetInventoriesResponseBody body = 1;
}

message EntityQueryRequest {
    sc.external.services.entitygraph.v1.EntityQueryRequestBody body = 1;
}

message EntityQueryResponse {
    sc.external.services.entitygraph.v1.EntityQueryResponseBody body = 1;
}

message MutateEntitiesRequest {
    sc.external.services.entitygraph.v1.MutateEntitiesRequestBody body = 1;
}

message MutateEntitiesResponse {
    sc.external.services.entitygraph.v1.MutateEntitiesResponseBody body = 1;
}

message InventoryQueryRequest {
    sc.external.services.entitygraph.v1.InventoryQueryRequestBody body = 1;
}

message InventoryQueryResponse {
    sc.external.services.entitygraph.v1.InventoryQueryResponseBody body = 1;
}

message ContainerQueryStreamRequest {
    sc.external.services.entitygraph.v1.ContainerQueryStreamRequestBody body = 1;
  }
  
message ContainerQueryStreamResponse {
  sc.external.services.entitygraph.v1.ContainerQueryStreamResponseBody body = 1;
}

message GetEntityStowContextsByGeidsRequest {
	sc.external.services.entitygraph.v1.GetEntityStowContextsByGeidsRequestBody body = 1;
}
message GetEntityStowContextsByGeidsResponse {
	sc.external.services.entitygraph.v1.GetEntityStowContextsByGeidsResponseBody body = 1;
}

message GetEntityStowContextsByParentUrnsRequest {
	sc.external.services.entitygraph.v1.GetEntityStowContextsByParentUrnsRequestBody body = 1;
}
message GetEntityStowContextsByParentUrnsResponse {
	sc.external.services.entitygraph.v1.GetEntityStowContextsByParentUrnsResponseBody body = 1;
}

message GetDatabaseVersionRequest {
    sc.external.services.entitygraph.v1.GetDatabaseVersionRequestBody body = 1;
}
message GetDatabaseVersionResponse {
    sc.external.services.entitygraph.v1.GetDatabaseVersionResponseBody body = 1;
}

service EntityGraphService {

    /*
        ContainerQuery

        Query and retrieve static object container hierachy for the current shard.
    */
    rpc ContainerQuery(ContainerQueryRequest) returns (ContainerQueryResponse) {
        option (google.api.http) = {
            post : "/v1/external/containers/query",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Containers"
        };
    }

    /*
        MoveRequest

        Move items between inventories owned by the same owner.
    */
    rpc Move(MoveRequest) returns (MoveResponse) {
        option (google.api.http) = {
            post : "/v1/external/entities/move",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    /*
        GetInventories

        Get inventories for ownerId
    */
    rpc GetInventories(GetInventoriesRequest) returns (GetInventoriesResponse) {
        option (google.api.http) = {
            post : "/v1/external/inventories",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Inventories"
        };
    }

    /*
        EntityQuery

        Query and retrieve entity sub-graphs. Limited to player-owned inventories.
    */
    rpc EntityQuery(EntityQueryRequest) returns (EntityQueryResponse) {
        option (google.api.http) = {
            post : "/v1/entities/query",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }
    
        /*
        MutateEntities

        Submit a group of commands to to mutate the entity graph *transactionally*.

        This is the primary method to perform graph mutations like appending new nodes
        and edges, breaking existing relationships or updating node properties.

        This method is transactional meaning that the group of commands submitted to
        `Mutate` are guaranteed to be executed in order and committed together in a
        single transaction, or rolled back entirely upon failure. Use this property
        to group together updates that **must** be performed together.

        For example, creating a new node, detaching anotherand attaching it to the
        new parent submitted in the same call to `Mutate` would be guaranteed to be
        written to the data store together.

        If the `enqueue` parameter is passed, the service will acknowledge the request and enqueue
        the mutation. This method allows to submit mutations when the caller does not need to know the result
        of the writes. This is useful to use in a "fire-and-forget" scenario as well as when
        the caller is submitting many writes. The transactional properties of each submitted mutation are still
        maintained even when `enqueue` is used.
    */
    rpc MutateEntities(MutateEntitiesRequest) returns (MutateEntitiesResponse) {
        option (google.api.http) = {
            post : "/v1/entities/mutate",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    /*
        InventoryQuery

        Query and retrieve inventories.
    */
    rpc InventoryQuery(InventoryQueryRequest) returns (InventoryQueryResponse) {
        option (google.api.http) = {
            post : "/v1/inventories/query",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Inventories"
        };
    }

    /*
    ContainerQueryStream

    Query and retrieve container sub-graphs, and recieve them over stream
  */
  rpc ContainerQueryStream(
    ContainerQueryStreamRequest
  ) returns (stream ContainerQueryStreamResponse) {
    option (google.api.http) = {
      post : "/v1/containers/query",
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "Containers"
    };
  }

    /*
        GetEntityStowContextsByGeids

        Get stow context records for entities by geids.
        Will automatically additionally filter by playerUrn in headers
    */
    rpc GetEntityStowContextsByGeids(GetEntityStowContextsByGeidsRequest) returns (GetEntityStowContextsByGeidsResponse) {
        option (google.api.http) = {
            post : "/v1/entities/unstowed/geids",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    /*
        GetEntityStowContextsByParentUrns

        Get stow context records for entities by parentUrns.
    */
    rpc GetEntityStowContextsByParentUrns(GetEntityStowContextsByParentUrnsRequest) returns (GetEntityStowContextsByParentUrnsResponse) {
        option (google.api.http) = {
            post : "/v1/entities/unstowed/parentUrns",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    /*
        GetDatabaseVersion

        Get the current database version string stored in the global database.
    */
    rpc GetDatabaseVersion(GetDatabaseVersionRequest) returns (GetDatabaseVersionResponse) {
        option (google.api.http) = {
            get: "/v1/database-version"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Database Version"
        };
    }
}

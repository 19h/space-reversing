syntax = "proto3";

package sc.external.services.entitlement.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

import "sc/external/common/api/v1/pagination.proto";
import "sc/external/common/api/v1/query.proto";
import "sc/external/services/entitlement/v1/types.proto";
import "sc/external/common/command/v1/types.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
      title: "Entitlement Service External API"
      version: "1.0",
      description: "Service responsible for player interactions with their entitlements"
    }
};

message QueryRequest {
    sc.external.common.api.v1.Query query = 2;
    reserved 1;
}
message QueryResponse {
    sc.external.common.api.v1.PaginationInfo page_info = 1;
    repeated Entitlement results = 2;
}

message ClaimRequest {
    message Claim {
        // URN identifier of the record to claim
        string urn = 1;
    }
    sc.external.common.command.v1.CommandArguments arguments = 1;
    // The claims to create
    repeated Claim claims = 2;
    reserved 3;
    reserved "fulfill";
}
message ClaimResponse { }

message UpdateArenaCommanderLoadoutRequest {
    sc.external.common.command.v1.CommandArguments arguments = 1;
    // URN identifier of the record to update
    string urn = 2;
    // Loadout to update the record with
    InsuranceItemPortLoadout loadout = 3;
}

message UpdateArenaCommanderLoadoutResponse { }

service ExternalEntitlementService {

    /*
        Query

        Query a player's own entitlement records.
    */
    rpc Query(QueryRequest) returns (QueryResponse) {
        option (google.api.http) = {
            post : "/v1/entitlement/query",
            body: "*"
        };
    }

    /*
        Claim

        Claim one of a player's own entitlement
    */
    rpc Claim(ClaimRequest) returns (ClaimResponse) {
        option (google.api.http) = {
            post : "/v1/entitlement/claim",
            body: "*"
        };
    }

    /*
        UpdateArenaCommanderLoadout

        Updates the Arena Commander loadout of a player's ship
    */
    rpc UpdateArenaCommanderLoadout(UpdateArenaCommanderLoadoutRequest) returns (UpdateArenaCommanderLoadoutResponse) {
        option (google.api.http) = {
            post : "/v1/entitlement/updateArenaCommanderLoadout"
            body: "*"
        };
    }
}

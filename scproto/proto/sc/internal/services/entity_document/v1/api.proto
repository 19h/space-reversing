syntax = "proto3";

package sc.internal.services.entity_document.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

import "sc/external/services/entity_document/v1/types.proto";
import "sc/internal/services/entity_document/v1/documents.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Entity Document Service"
    version: "1.0",
    description: "Service to persist and retrieve documents attached to entities"
  }
};


message CreateRequest {
    message Body {
        sc.external.services.entity_document.v1.CreateCommand command = 1;
        EntityDocumentBody body = 2;
    }
    repeated Body creates = 1;
}
message CreateResponse {}

message UpsertRequest {
    message Body {
        sc.external.services.entity_document.v1.UpsertCommand command = 1;
        EntityDocumentBody body = 2;
    }
    repeated Body upserts = 1;
}
message UpsertResponse {}

message PrepareRequest {
    message Body {
        sc.external.services.entity_document.v1.PrepareCommand command = 1;
        EntityDocumentBody body = 2;
    }
    repeated Body prepares = 1;
}
message PrepareResponse {}

message CommitRequest {
    message Body {
        sc.external.services.entity_document.v1.CommitCommand command = 1;
    }
    repeated Body commits = 1;
}
message CommitResponse {}

message UpdateRequest {
    message Body {
        sc.external.services.entity_document.v1.UpdateCommand command = 1;
        EntityDocumentBody partial = 2;
    }
    repeated Body updates = 1;
}
message UpdateResponse {}

message EraseRequest {
    message Body {
        sc.external.services.entity_document.v1.EraseCommand command = 1;
    }
    repeated Body erasures = 1;
}
message EraseResponse {}

message FetchRequest {
    message Body {
        sc.external.services.entity_document.v1.DocumentQuery query = 1;
    }
    repeated Body queries = 1;
}
message FetchResponse {
    repeated EntityDocument documents = 1;
}

service EntityDocumentService {
    rpc Create(CreateRequest) returns (CreateResponse) {
        option (google.api.http) = {
            post : "/v1/entity-documents/creates",
            body: "*"
        };
    } 
    rpc Upsert(UpsertRequest) returns (UpsertResponse) {
        option (google.api.http) = {
            post : "/v1/entity-documents/upserts",
            body: "*"
        };
    } 
    rpc Update(UpdateRequest) returns (UpdateResponse) {
        option (google.api.http) = {
            post : "/v1/entity-documents/updates",
            body: "*"
        };
    }
    rpc Prepare(PrepareRequest) returns (PrepareResponse) {
        option (google.api.http) = {
            post : "/v1/entity-documents/prepares",
            body: "*"
        };
    }
    rpc Commit(CommitRequest) returns (CommitResponse) {
        option (google.api.http) = {
            post : "/v1/entity-documents/commits",
            body: "*"
        };
    }
    rpc Erase(EraseRequest) returns (EraseResponse) {
        option (google.api.http) = {
            post : "/v1/entity-documents/erasures",
            body: "*"
        };
    }
    rpc Fetch(FetchRequest) returns (FetchResponse) {
        option (google.api.http) = {
            post : "/v1/entity-documents/fetch",
            body: "*"
        };
    }   
}
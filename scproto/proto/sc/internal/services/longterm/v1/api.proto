syntax = "proto3";

package sc.internal.services.longterm.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "sc/external/common/command/v1/types.proto";
import "sc/external/common/api/v1/query.proto";
import "sc/external/common/api/v1/pagination.proto";
import "sc/external/services/longterm/v1/types.proto";
import "sc/internal/services/longterm/v1/commands.proto";


option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
      title: "Long Term Persistence service"
      version: "1.0",
      description: "Service responsible retrieval ownership records across patches"
    }
};

message QueryOwnershipRecordsRequest {
    sc.external.common.api.v1.Query query = 1;
}

message QueryOwnershipRecordsResponse {
    sc.external.common.api.v1.PaginationInfo page_info = 1;
    repeated sc.external.services.longterm.v1.OwnershipRecord results = 2;
}

message SetPersistentPropertiesRequest {
  SetPersistentPropertiesCommand command = 1;
  sc.external.common.command.v1.CommandArguments arguments = 2;
}

message SetPersistentPropertiesResponse {}

service LongTermService {

    /*
        OwnershipQuery

        Query and retrieve longterm ownership record for a player
    */
    rpc QueryOwnershipRecords(QueryOwnershipRecordsRequest) returns (QueryOwnershipRecordsResponse) {
        option (google.api.http) = {
            post : "/v1/ownership/query",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Ownership"
        };
    }
  /*
    SetPersistentProperties

    Command to set persistent properties (PersistentEntityProperties) of entities.

    SetPersistentProperties on entitlement will:
    - Replace the entire snapshot document for an entitlement
  */
  rpc SetPersistentProperties(SetPersistentPropertiesRequest) returns (SetPersistentPropertiesResponse) {
    option (google.api.http) = {
      post : "/v2/ownership/setPersistentProperties",
      body: "*"
    };
  }

}

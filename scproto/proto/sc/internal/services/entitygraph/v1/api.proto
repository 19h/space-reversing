service EntityGraphService {

    /*
        MutateEntities

        Submit a group of commands to to mutate the entity graph *transactionally*.

        This is the primary method to perform graph mutations like appending new nodes
        and edges, breaking existing relationships or updating node properties.

        This method is transactional meaning that the group of commands submitted to
        `Mutate` are guaranteed to be executed in order and committed together in a
        single transaction, or rolled back entirely upon failure. Use this property
        to group together updates that **must** be performed together.

        For example, creating a new node, detaching anotherand attaching it to the
        new parent submitted in the same call to `Mutate` would be guaranteed to be
        written to the data store together.

        If the `enqueue` parameter is passed, the service will acknowledge the request and enqueue
        the mutation. This method allows to submit mutations when the caller does not need to know the result
        of the writes. This is useful to use in a "fire-and-forget" scenario as well as when
        the caller is submitting many writes. The transactional properties of each submitted mutation are still
        maintained even when `enqueue` is used.
    */
    rpc MutateEntities(MutateEntitiesRequest) returns (MutateEntitiesResponse) {
        option (google.api.http) = {
            post : "/v1/entities/mutate",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    /*
        EntityMutationStream

        Submit a stream of group of commands to to mutate the entity graph *transactionally*.

        When streaming in mutations, the service will acknowledge the request and enqueue
        the mutation. This method allows to submit mutations when the caller does not need to know the result
        of the writes. This is useful to use in a "fire-and-forget" scenario as well as when
        the caller is submitting many writes. The transactional properties & ordering guarantees of each submitted mutation are still
        maintained.
    */
    rpc EntityMutationStream(stream EntityMutationStreamRequest) returns (stream EntityMutationStreamResponse) {
        option (google.api.http) = {
            post : "/v1/entities/mutationStream",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    rpc Stow(StowRequest) returns (StowResponse) {
        option (google.api.http) = {
            post : "/v1/entities/stow",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    rpc Unstow(UnstowRequest) returns (UnstowResponse) {
        option (google.api.http) = {
            post : "/v1/entities/unstow",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    rpc Bury(BuryRequest) returns (BuryResponse) {
        option (google.api.http) = {
            post : "/v1/entities/bury",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    /*
        EntityQuery

        Query and retrieve entity sub-graphs.
    */
    rpc EntityQuery(EntityQueryRequest) returns (EntityQueryResponse) {
        option (google.api.http) = {
            post : "/v1/entities/query",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }


    /*
        LoadAll

        Retrieve entire graph.
    */
    rpc LoadAll(LoadAllRequest) returns (LoadAllResponse) {
        option (google.api.http) = {
            post : "/v1/entities/loadAll",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    /*
        SnapshotQuery

        Query and retrieve data from entity snapshots.
    */
    rpc SnapshotQuery(SnapshotQueryRequest) returns (SnapshotQueryResponse) {
        option (google.api.http) = {
            post : "/v1/snapshots/query",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Entities"
        };
    }

    /*
        MutateContainerGraph

        Submit a group of commands to to mutate the static object container hierarchy of the current shard.

        Part of the seeding process of a new shard must submit a static OC hierarchy dataset for new servers joining the mesh.

        This endpoint allows manipulation of the static OC data, either to create or modify or migrate the existing hierarchy.

        This method is transactional meaning that the group of commands submitted to
        `Mutate` are guaranteed to be executed in order and committed together in a
        single transaction, or rolled back entirely upon failure. Use this property
        to group together updates that **must** be performed together.
    */
    rpc MutateContainerGraph(MutateContainerGraphRequest) returns (MutateContainerGraphResponse) {
        option (google.api.http) = {
            post : "/v1/containers/mutate",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Containers"
        };
    }

    /*
        ContainerMutationStream

        Submit a stream of group of commands to to mutate the container graph *transactionally*.

        When streaming in mutations, the service will acknowledge the request and enqueue
        the mutation. This method allows to submit mutations when the caller does not need to know the result
        of the writes. This is useful to use in a "fire-and-forget" scenario as well as when
        the caller is submitting many writes. The transactional properties & ordering guarantees of each submitted mutation are still
        maintained.
    */
    rpc ContainerMutationStream(stream ContainerMutationStreamRequest) returns (stream ContainerMutationStreamResponse) {
        option (google.api.http) = {
            post : "/v1/containers/mutationStream",
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            tags: "Containers"
        };
    }

    /*
        ContainerQuery

        Query and retrieve static object container hierachy for the current shard.
    */
    rpc ContainerQuery(ContainerQueryRequest) returns (ContainerQueryResponse) {
        option (google.api.http) = {
            post : "/v1/containers/query",
            body: "*"

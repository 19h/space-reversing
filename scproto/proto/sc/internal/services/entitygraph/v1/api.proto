        of the writes. This is useful to use in a "fire-and-forget" scenario as well as when
        the caller is submitting many writes. The transactional properties of each submitted mutation are still
        maintained even when `enqueue` is used.
    */
    rpc MutateInventories(MutateInventoriesRequest) returns (MutateInventoriesResponse) {

syntax = "proto3";

package sc.internal.services.blueprint_library.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

import "sc/external/services/blueprint_library/v1/types.proto";
import "sc/external/common/api/v1/pagination.proto";
import "sc/external/common/api/v1/query.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
      title: "Blueprint Library Service"
      version: "1.0",
      description: "Service responsible for blueprint library management"
    }
};

message CreateBlueprintEntriesRequest {
  uint64 player_id = 1;
  repeated sc.external.services.blueprint_library.v1.BlueprintEntry entries = 2;

}

message CreateBlueprintEntriesResponse {
  
}

message UpdateBlueprintEntriesRequest {
  uint64 player_id = 1;
  repeated sc.external.services.blueprint_library.v1.BlueprintEntry entries = 2;
}

message UpdateBlueprintEntriesResponse {
  
}

message QueryBlueprintEntriesRequest {
  uint64 player_id = 1;
  sc.external.common.api.v1.Query query = 2;
}

message QueryBlueprintEntriesResponse {
  sc.external.common.api.v1.PaginationInfo page_info = 1;
  repeated sc.external.services.blueprint_library.v1.BlueprintEntry results = 2;
}

message DeleteBlueprintEntriesRequest {
  uint64 player_id = 1;
  repeated string blueprint_ids = 2;
}

message DeleteBlueprintEntriesResponse {
  uint32 deleted_count = 1;
}

message QueryBlueprintEntriesStreamRequest {
  uint64 player_id = 1;
  sc.external.common.api.v1.Query query = 2;
}

message QueryBlueprintEntriesStreamResponse {
  repeated sc.external.services.blueprint_library.v1.BlueprintEntry entries = 1;
}

service BlueprintLibraryService {

  /*
    Create blueprint entries.
    This is used to create blueprint entries for a given account.
  */
  rpc CreateBlueprintEntries(CreateBlueprintEntriesRequest) returns (CreateBlueprintEntriesResponse) {
    option (google.api.http) = {
      post: "/v1/internal/blueprint-library/create-entries"
      body: "*"
    };
  }

  /*
    Update blueprint entries.
    This is used to update blueprint entries for a given account.
  */
  rpc UpdateBlueprintEntries(UpdateBlueprintEntriesRequest) returns (UpdateBlueprintEntriesResponse) {
    option (google.api.http) = {
      post: "/v1/internal/blueprint-library/update-entries"
      body: "*"
    };
  }

  /*
    Query blueprint entries.
    This is used to query blueprint entries for the authenticated associate user account in the grpc metadata.
  */
  rpc QueryBlueprintEntries(QueryBlueprintEntriesRequest) returns (QueryBlueprintEntriesResponse) {
    option (google.api.http) = {
      post: "/v1/internal/blueprint-library/query-blueprint-entries"
      body: "*"
    };
  }

  /*
    Delete blueprint entries.
    This is used to delete blueprint entries for a given account.
  */
  rpc DeleteBlueprintEntries(DeleteBlueprintEntriesRequest) returns (DeleteBlueprintEntriesResponse) {
    option (google.api.http) = {
      post: "/v1/internal/blueprint-library/delete-entries"
      body: "*"
    };
  }

  /*
    Query Server Stream blueprint entries.
    This is used to query blueprint entries for the authenticated associate user account in the grpc metadata. For debugging purposes.
  */
  rpc QueryBlueprintEntriesStream(QueryBlueprintEntriesStreamRequest) returns (stream QueryBlueprintEntriesStreamResponse) {
    option (google.api.http) = {
      post: "/v1/internal/blueprint-library/query-blueprint-entries-stream"
      body: "*"
    };
  }
}
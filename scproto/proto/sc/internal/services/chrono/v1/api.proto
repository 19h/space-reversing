syntax = "proto3";

package sc.internal.services.chrono.v1;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "sc/internal/services/chrono/v1/types.proto";
import "sc/external/common/api/v1/pagination.proto";
import "sc/external/common/api/v1/query.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
      title: "Chrono Service"
      version: "1.0",
      description: "Service responsible for scheduling immediate, repeatable and delayed jobs"
    }
};

message CreateJobsRequest {
    repeated Job jobs = 1;
}
message CreateJobsResponse {
    // Job Ids that were successfully created
    repeated string ids = 1;
   
}

message CancelJobsRequest {
    repeated string ids = 1;
}
message CancelJobsResponse {
    // Job Ids that were successfully cancelled (were in active state etc..)
    repeated string ids = 1;
   
}

message RescheduleJobsRequest {
    message Body {
        string id = 1;
        JobSchedule schedule = 2;
    }
    repeated Body reschedules = 1;
}
message RescheduleJobsResponse {
    // Job Ids that were successfully rescheduled (were in active state etc..)
    repeated string ids = 1;
}

message QueryJobsRequest {
    sc.external.common.api.v1.Query query = 1;
}
message QueryJobsResponse {
    sc.external.common.api.v1.PaginationInfo page_info = 1;
    repeated ScheduledJob results = 2;
}

message QueryJobLogsRequest {
    sc.external.common.api.v1.Query query = 1;
}

message QueryJobLogsResponse {
    sc.external.common.api.v1.PaginationInfo page_info = 1;
    repeated JobLogs results = 2;
}


service ChronoService {

    /*
      CreateJob

      Allows creating a new job with a given timer
    */
    rpc CreateJobs(CreateJobsRequest) returns (CreateJobsResponse) {
        option (google.api.http) = {
            post : "/v1/chrono/create",
            body: "*"
        };
    }

    /*
      CancelJob

      Allows cancelling job by their Job Ids
    */
    rpc CancelJobs(CancelJobsRequest) returns (CancelJobsResponse) {
        option (google.api.http) = {
            post : "/v1/chrono/cancel",
            body: "*"
        };
    }

    /*
      RescheduleJobs

      Update schedule of a existing jobs
    */
    rpc RescheduleJobs(RescheduleJobsRequest) returns (RescheduleJobsResponse) {
        option (google.api.http) = {
            post : "/v1/chrono/reschedule",
            body: "*"
        };
    }

    /*
      Query Jobs

      Allows quering for jobs
    */
    rpc QueryJobs(QueryJobsRequest) returns (QueryJobsResponse) {
        option (google.api.http) = {
            post : "/v1/chrono/update",
            body: "*"
        };
    }

    /*
      Query Jobs

      Allows quering for jobs
    */
    rpc QueryJobLogs(QueryJobLogsRequest) returns (QueryJobLogsResponse) {
        option (google.api.http) = {
            post : "/v1/chrono/logs",
            body: "*"
        };
    }
}

syntax = "proto3";

package sc.internal.services.chrono.v1;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";


import "sc/external/common/command/v1/types.proto";

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_ACTIVE = 1;
  JOB_STATUS_EXPIRED = 2;
  JOB_STATUS_CANCELLED = 3;
  JOB_STATUS_FINISHED = 4;
}

message JobSchedule {
  // (Optional) When the job starts from (if not specified job starts immedietly or follows cron structure if reoccurring)
  google.protobuf.Timestamp start_time = 1;
  // (Optional) When the job ends
  google.protobuf.Timestamp end_time = 2;
  // (Optional) Recurring cron spec for the job
  string cron_spec = 3;
}

message Job {
  // Id of the Job
  string id = 1;
  // Name of the job
  string name = 2;
  // Schedule of the job
  JobSchedule schedule = 3;
  // Destinations to notify at each invocation of the job
  repeated sc.external.common.command.v1.NotifyDestination destinations = 4;
  // Tags to find and identify this job
  repeated string tags = 5;
  // Body of the job, can be any valid already searialized proto message
  google.protobuf.Any body = 6;
  // Title in case if the name is already use for something else
  optional string title = 7;
}

message ScheduledJob {
  // Id of the Job
  string id = 1;
  // Name of the job
  string name = 2;
  // Schedule of the job
  JobSchedule schedule = 3;
  // Destinations to notify at each invocation of the job
  repeated sc.external.common.command.v1.NotifyDestination destinations = 4;
  // Tags to find and identify this job
  repeated string tags = 5;
  // Body of the job, can be any valid proto message
  google.protobuf.Any body = 6;

  // Active status of the job
  JobStatus status = 10;
  // Title in case if the name is already use for something else
  optional string title = 11;

  // Time of job creation
  google.protobuf.Timestamp created_at = 12;
  // Time of last job update
  google.protobuf.Timestamp last_modified_at = 13;
  // Time of last invocation
  google.protobuf.Timestamp last_ran_at = 14;

  reserved "created_time", "last_modified_time",  "last_ran_time";
  reserved 7, 8, 9;
}

enum JobLogAction {
  JOB_LOG_ACTION_UNSPECIFIED = 0;
  // Job was created
  JOB_LOG_ACTION_CREATED = 1;
  // Job was rescheduled
  JOB_LOG_ACTION_RESCHEDULED = 2;
  // Job was cancelled
  JOB_LOG_ACTION_CANCELLED = 3;
  // Job was run
  JOB_LOG_ACTION_RUN = 4;
  // Job expired
  JOB_LOG_ACTION_EXPIRED = 5;
}

message JobLogs {
  // Id of the JobLog
  string id = 1;
  // Timestamp log was created at
  uint64 created_at = 3;
  JobLogAction action = 4;
  // Id Of the job that created the log
  string job_id = 5;
  string name = 6;
  repeated string tags = 7;
  optional string title = 8;


  reserved 2;
  reserved "job_action";
}
